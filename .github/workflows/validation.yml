name: validation

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full:
        description: 'Force full validation'
        type: boolean
        default: false
  schedule:
    - cron: '17 3 * * 1'

jobs:
  validate:
    name: validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select validation profile
        id: select
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            args=(--full)
# line-length: ignore-next-line -- legacy line pending wrap
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full }}" = "true" ]; then
            args=(--full)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
# line-length: ignore-next-line -- legacy line pending wrap
            args=(--base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}")
# line-length: ignore-next-line -- legacy line pending wrap
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
# line-length: ignore-next-line -- legacy line pending wrap
            args=(--base "${{ github.event.before }}" --head "${{ github.sha }}")
          else
            args=(--full)
          fi

          trusted_profile=""
          if [ "${args[0]}" = "--base" ]; then
            if ! git diff --quiet "${args[1]}" "${args[3]}" -- \
              pyproject.toml 'requirements*.txt' 'constraints*.txt' '*lock*' \
              Makefile AGENTS.md .codex scripts .github validation; then
              trusted_profile="full"
            fi
          elif [ "${args[0]}" = "--full" ]; then
            trusted_profile="full"
          fi

          if [ "$trusted_profile" = "full" ]; then
            {
              echo "Selected validation profile: full"
              echo "Changed paths:"
              echo "  <trusted workflow preflight forced full validation>"
              echo "Reasons:"
# line-length: ignore-next-line -- legacy line pending wrap
              echo "  - validation machinery path changed; hard-coded full validation before invoking PR-edited validator"
            } | tee selection.txt
          else
# line-length: ignore-next-line -- legacy line pending wrap
            python3 scripts/validate_changes.py "${args[@]}" --dry-run | tee selection.txt
          fi
# line-length: ignore-next-line -- legacy line pending wrap
          profile=$(awk -F': ' '/^Selected validation profile:/ {print $2}' selection.txt)
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "trusted_profile=$trusted_profile" >> "$GITHUB_OUTPUT"
          cat selection.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Run documentation validation
        if: steps.select.outputs.profile == 'docs'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
# line-length: ignore-next-line -- legacy line pending wrap
            python3 scripts/validate_changes.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"
# line-length: ignore-next-line -- legacy line pending wrap
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
# line-length: ignore-next-line -- legacy line pending wrap
            python3 scripts/validate_changes.py --base "${{ github.event.before }}" --head "${{ github.sha }}"
          else
            python3 scripts/validate_changes.py --worktree
          fi

      - name: Set up Python for code/full validation
        if: steps.select.outputs.profile != 'docs'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install project environment
        if: steps.select.outputs.profile != 'docs'
        run: make setup

      - name: Run selected validation
        if: steps.select.outputs.profile != 'docs'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.select.outputs.trusted_profile }}" = "full" ]; then
            .venv/bin/python scripts/validate_changes.py --full
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            .venv/bin/python scripts/validate_changes.py --full
# line-length: ignore-next-line -- legacy line pending wrap
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.full }}" = "true" ]; then
            .venv/bin/python scripts/validate_changes.py --full
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
# line-length: ignore-next-line -- legacy line pending wrap
            .venv/bin/python scripts/validate_changes.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"
# line-length: ignore-next-line -- legacy line pending wrap
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
# line-length: ignore-next-line -- legacy line pending wrap
            .venv/bin/python scripts/validate_changes.py --base "${{ github.event.before }}" --head "${{ github.sha }}"
          else
            .venv/bin/python scripts/validate_changes.py --full
          fi
